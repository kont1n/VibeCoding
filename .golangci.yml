# golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true

issues:
  uniq-by-line: true
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    # Core
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign

    # Style & formatting
    - misspell
    - unconvert
    - nakedret
    - goconst
    - godot
    - whitespace

    # Bugs & security
    - gocritic
    - gosec
    - bodyclose
    - contextcheck
    - errname
    - errorlint
    - forcetypeassert
    - prealloc
    - predeclared
    - rowserrcheck
    - sqlclosecheck
    - wastedassign

    # Code quality
    - dupl
    - revive
    - unparam
    - usestdlibvars
    - copyloopvar
    - sloglint
    - nosprintfhostport
    - gocheckcompilerdirectives
    - gomoddirectives

  exclusions:
    paths:
      - internal/infrastructure/ml  # requires CGO ONNX Runtime

    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - dupl
          - gocritic
          - forcetypeassert
      - path: "mocks/"
        linters:
          - errcheck
          - gosec
          - unused
      - path: '\\.pb\\.go$'
        linters:
          - gofmt
          - goimports

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

    gocritic:
      enable-all: true
      disabled-checks:
        - whyNoLint
        - hugeParam
        - rangeValCopy

    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104
        - G115

    revive:
      confidence: 0.8
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: if-return
        - name: increment-decrement
        - name: var-naming
          arguments:
            - ["ID"]
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
          disabled: true
        - name: unreachable-code
        - name: redefines-builtin-id

    misspell:
      locale: US

    godot:
      scope: all
      exclude:
        - "^ \\+gen"
        - "^ \\+gowrap"

    errcheck:
      check-blank: false
      check-type-assertions: true

formatters:
  enable:
    - gofmt
    - goimports
    - gci
  settings:
    gofmt:
      simplify: true
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
    goimports:
      local-prefixes: github.com/kont1n/face-grouper
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/kont1n/face-grouper)
      custom-order: true

severity:
  default: error
