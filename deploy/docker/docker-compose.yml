# =============================================================================
# Face Grouper - Docker Compose
# =============================================================================
# Easy deployment for CPU and GPU versions
# Documentation: docs/DOCKER.md
# =============================================================================

version: '3.8'

services:
  # -------------------------------------------------------------------------
  # CPU Version
  # -------------------------------------------------------------------------
  face-grouper-cpu:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        ONNXRUNTIME_VERSION: "1.23.0"
    image: face-grouper:cpu
    container_name: face-grouper-cpu
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8080:8080"
    
    # Volume mounts
    volumes:
      - ./dataset:/app/dataset:ro
      - ./output:/app/output
      - ./models:/app/models:ro
    
    # Environment variables
    environment:
      - INPUT_DIR=/app/dataset
      - OUTPUT_DIR=/app/output
      - MODELS_DIR=/app/models
      - GPU_ENABLED=0
      - FORCE_CPU=1
      - PROVIDER_PRIORITY=cpu
      - EXTRACT_WORKERS=4
      - LOG_LEVEL=info
      - LOG_JSON=false
      - WEB_SERVE=true
      - WEB_PORT=8080
    
    # Resource limits (CPU)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Command override (optional)
    # command: ["--serve", "--port", "8080"]
  
  # -------------------------------------------------------------------------
  # GPU Version (AMD ROCm)
  # -------------------------------------------------------------------------
  face-grouper-rocm:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.rocm
      args:
        ONNXRUNTIME_VERSION: "1.23.0"
    image: face-grouper:rocm
    container_name: face-grouper-rocm
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8082:8080"
    
    # Volume mounts
    volumes:
      - ./dataset:/app/dataset:ro
      - ./output:/app/output
      - ./models:/app/models:ro
    
    # Device access for ROCm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    
    # Group access for GPU
    group_add:
      - video
      - render
    
    # Environment variables
    environment:
      - INPUT_DIR=/app/dataset
      - OUTPUT_DIR=/app/output
      - MODELS_DIR=/app/models
      - GPU_ENABLED=1
      - GPU_DEVICE_ID=0
      - PROVIDER_PRIORITY=rocm
      - HIP_VISIBLE_DEVICES=0
      - ROCR_VISIBLE_DEVICES=0
      - EXTRACT_WORKERS=4
      - GPUDet_SESSIONS=2
      - GPU_REC_SESSIONS=2
      - EMBED_BATCH_SIZE=64
      - LOG_LEVEL=info
      - LOG_JSON=false
      - WEB_SERVE=true
      - WEB_PORT=8080
    
    # Resource limits
    deploy:
      resources:
        reservations:
          devices:
            - driver: amdgpu
              count: 1
              capabilities: [gpu]
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Command override (optional)
    # command: ["--serve", "--port", "8080"]
  # -------------------------------------------------------------------------
  # GPU Version (NVIDIA)
  # -------------------------------------------------------------------------
  face-grouper-gpu:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.nvidia
      args:
        ONNXRUNTIME_VERSION: "1.23.0"
    image: face-grouper:gpu
    container_name: face-grouper-gpu
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8081:8080"
    
    # Volume mounts
    volumes:
      - ./dataset:/app/dataset:ro
      - ./output:/app/output
      - ./models:/app/models:ro
    
    # Environment variables
    environment:
      - INPUT_DIR=/app/dataset
      - OUTPUT_DIR=/app/output
      - MODELS_DIR=/app/models
      - GPU_ENABLED=1
      - GPU_DEVICE_ID=0
      - PROVIDER_PRIORITY=cuda
      - EXTRACT_WORKERS=4
      - GPUDet_SESSIONS=2
      - GPU_REC_SESSIONS=2
      - EMBED_BATCH_SIZE=64
      - LOG_LEVEL=info
      - LOG_JSON=false
      - WEB_SERVE=true
      - WEB_PORT=8080
    
    # GPU resources (requires NVIDIA Container Toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Command override (optional)
    # command: ["--serve", "--port", "8080"]

# =============================================================================
# Usage:
# =============================================================================
# Start CPU version:
#   docker-compose up -d face-grouper-cpu
#
# Start NVIDIA GPU version:
#   docker-compose up -d face-grouper-gpu
#
# Start AMD ROCm version:
#   docker-compose up -d face-grouper-rocm
#
# Start all:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f face-grouper-cpu
#   docker-compose logs -f face-grouper-gpu
#   docker-compose logs -f face-grouper-rocm
#
# Stop:
#   docker-compose down
#
# Stop and remove volumes:
#   docker-compose down -v
#
# Rebuild:
#   docker-compose build --no-cache
#
# Scale (not recommended for this app):
#   docker-compose up -d --scale face-grouper-cpu=2
# =============================================================================
