# =============================================================================
# Face Grouper - Docker Compose
# =============================================================================
# Easy deployment for CPU and GPU versions
# Documentation: docs/DOCKER.md
# =============================================================================

version: '3.8'

services:
  # -------------------------------------------------------------------------
  # PostgreSQL Database with pgvector
  # -------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: face-grouper-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: face-grouper
      POSTGRES_USER: face-grouper
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: "-E UTF8"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    ports:
      - "127.0.0.1:5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face-grouper -d face-grouper"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - face-grouper-network

  # -------------------------------------------------------------------------
  # Redis Cache (optional)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: face-grouper-redis
    restart: unless-stopped

    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}

    volumes:
      - redis_data:/data

    ports:
      - "127.0.0.1:6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - face-grouper-network

  # -------------------------------------------------------------------------
  # CPU Version
  # -------------------------------------------------------------------------
  face-grouper-cpu:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.cpu
      args:
        ONNXRUNTIME_VERSION: "1.24.4"
    image: face-grouper:cpu
    container_name: face-grouper-cpu
    restart: unless-stopped
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    # Port mapping
    ports:
      - "8080:8080"
    
    # Volume mounts
    volumes:
      - ../../dataset:/app/dataset:ro
      - ../../output:/app/output
      - ../../models:/app/models:ro
    
    # Environment variables
    environment:
      - INPUT_DIR=/app/dataset
      - OUTPUT_DIR=/app/output
      - MODELS_DIR=/app/models
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=face-grouper
      - DB_USER=face-grouper
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - DB_SSLMODE=require
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - GPU_ENABLED=0
      - FORCE_CPU=1
      - PROVIDER_PRIORITY=cpu
      - EXTRACT_WORKERS=10
      - EMBED_BATCH_SIZE=192
      - EMBED_FLUSH_MS=5
      - MAX_DIM=1280
      - LOG_LEVEL=info
      - LOG_JSON=false
      - WEB_SERVE=true
      - WEB_PORT=8080
    
    networks:
      - face-grouper-network
    
    # Resource limits (CPU)
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 6G
        reservations:
          cpus: '4.0'
          memory: 2G
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Command override (optional)
    # command: ["--serve", "--port", "8080"]
  
  # -------------------------------------------------------------------------
  # GPU Version (AMD ROCm)
  # -------------------------------------------------------------------------
  face-grouper-rocm:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rocm
      args:
        ONNXRUNTIME_VERSION: "1.24.4"
    image: face-grouper:rocm
    container_name: face-grouper-rocm
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8082:8080"
    
    # Volume mounts
    volumes:
      - ../../dataset:/app/dataset:ro
      - ../../output:/app/output
      - ../../models:/app/models:ro
    
    # Device access for ROCm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    
    # Group access for GPU
    group_add:
      - video
      - render
    
    # Environment variables
    environment:
      - INPUT_DIR=/app/dataset
      - OUTPUT_DIR=/app/output
      - MODELS_DIR=/app/models
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=face-grouper
      - DB_USER=face-grouper
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - DB_SSLMODE=require
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - GPU_ENABLED=1
      - GPU_DEVICE_ID=0
      - PROVIDER_PRIORITY=rocm
      - HIP_VISIBLE_DEVICES=0
      - ROCR_VISIBLE_DEVICES=0
      - EXTRACT_WORKERS=4
      - GPU_DET_SESSIONS=2
      - GPU_REC_SESSIONS=2
      - EMBED_BATCH_SIZE=64
      - LOG_LEVEL=info
      - LOG_JSON=false
      - WEB_SERVE=true
      - WEB_PORT=8080
    
    # Resource limits
    deploy:
      resources:
        reservations:
          devices:
            - driver: amdgpu
              count: 1
              capabilities: [gpu]

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Command override (optional)
    # command: ["--serve", "--port", "8080"]
  # -------------------------------------------------------------------------
  # GPU Version (NVIDIA)
  # -------------------------------------------------------------------------
  face-grouper-gpu:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.nvidia
      args:
        ONNXRUNTIME_VERSION: "1.24.4"
    image: face-grouper:gpu
    container_name: face-grouper-gpu
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "8081:8080"
    
    # Volume mounts
    volumes:
      - ../../dataset:/app/dataset:ro
      - ../../output:/app/output
      - ../../models:/app/models:ro
    
    # Environment variables
    environment:
      - INPUT_DIR=/app/dataset
      - OUTPUT_DIR=/app/output
      - MODELS_DIR=/app/models
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=face-grouper
      - DB_USER=face-grouper
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - DB_SSLMODE=require
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - GPU_ENABLED=1
      - GPU_DEVICE_ID=0
      - PROVIDER_PRIORITY=cuda
      - EXTRACT_WORKERS=4
      - GPU_DET_SESSIONS=2
      - GPU_REC_SESSIONS=2
      - EMBED_BATCH_SIZE=64
      - LOG_LEVEL=info
      - LOG_JSON=false
      - WEB_SERVE=true
      - WEB_PORT=8080
    
    # GPU resources (requires NVIDIA Container Toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Command override (optional)
    # command: ["--serve", "--port", "8080"]

# =============================================================================
# Usage:
# =============================================================================
# Start CPU version:
#   docker-compose up -d face-grouper-cpu
#
# Start NVIDIA GPU version:
#   docker-compose up -d face-grouper-gpu
#
# Start AMD ROCm version:
#   docker-compose up -d face-grouper-rocm
#
# Start all:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f face-grouper-cpu
#   docker-compose logs -f face-grouper-gpu
#   docker-compose logs -f face-grouper-rocm
#
# Stop:
#   docker-compose down
#
# Stop and remove volumes:
#   docker-compose down -v
#
# Rebuild:
#   docker-compose build --no-cache
#
# Scale (not recommended for this app):
#   docker-compose up -d --scale face-grouper-cpu=2
# =============================================================================

# -------------------------------------------------------------------------
# Networks
# -------------------------------------------------------------------------
networks:
  face-grouper-network:
    driver: bridge

# -------------------------------------------------------------------------
# Volumes
# -------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
