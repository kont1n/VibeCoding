name: Docker Build and Push

on:
  push:
    branches: [main, v2]
    tags: ['v*']
  pull_request:
    branches: [main, v2]
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor (cpu, gpu, rocm, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - cpu
          - gpu
          - rocm
          - all

env:
  REGISTRY: ghcr.io
  # Default for linting/expressions; overridden to lowercase in the first step of each job.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -------------------------------------------------------------------------
  # Build CPU Image
  # -------------------------------------------------------------------------
  build-cpu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=cpu-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ONNXRUNTIME_VERSION=1.23.0

      - name: Run Trivy vulnerability scanner (CPU)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-cpu-results.sarif'
        if: github.event_name != 'pull_request'

      - name: Upload Trivy scan results (CPU)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-cpu-results.sarif'
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-cpu-results.sarif') != ''

  # -------------------------------------------------------------------------
  # Build GPU Image (NVIDIA)
  # -------------------------------------------------------------------------
  build-gpu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=gpu-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push GPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile.nvidia
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ONNXRUNTIME_VERSION=1.23.0

      - name: Run Trivy vulnerability scanner (GPU)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-gpu-results.sarif'
        if: github.event_name != 'pull_request'

      - name: Upload Trivy scan results (GPU)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-gpu-results.sarif'
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-gpu-results.sarif') != ''

  # -------------------------------------------------------------------------
  # Build ROCm Image
  # -------------------------------------------------------------------------
  build-rocm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=rocm-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ROCm image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile.rocm
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ONNXRUNTIME_VERSION=1.18.0

      - name: Run Trivy vulnerability scanner (ROCm)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-rocm-results.sarif'
        if: github.event_name != 'pull_request'

      - name: Upload Trivy scan results (ROCm)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-rocm-results.sarif'
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-rocm-results.sarif') != ''
