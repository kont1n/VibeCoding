<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Face Grouper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="/static/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* === ТИПОГРАФИКА === */
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Source Sans 3', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    
    /* === ЦВЕТА: Пленочная теплота === */
    /* Базовые фоны — тёплые, сепия-оттенки */
    --bg: #0f0d0a;
    --bg-card: #1e1a15;
    --bg-secondary: #1a1612;
    --bg-tertiary: #252019;
    --bg-header: linear-gradient(180deg, rgba(26, 22, 18, 0.95) 0%, rgba(15, 13, 10, 0.8) 100%);
    --bg-glass: rgba(30, 26, 21, 0.75);
    --bg-glass-hover: rgba(30, 26, 21, 0.9);
    
    /* Акценты — пленочные цвета */
    --accent: #d4a574;
    --accent-secondary: #e8c4a0;
    --accent-soft: rgba(212, 165, 116, 0.12);
    --accent-glow: rgba(212, 165, 116, 0.25);
    
    /* Текст — тёплые оттенки */
    --text: #f5ebe0;
    --text-muted: #b8a99a;
    --text-dim: #8a7f72;
    
    /* Границы */
    --border: rgba(212, 165, 116, 0.08);
    --border-light: rgba(212, 165, 116, 0.06);
    --border-medium: rgba(212, 165, 116, 0.15);
    --border-accent: rgba(212, 165, 116, 0.35);
    --radius: 16px;
    
    /* Функциональные цвета */
    --success: #7fb069;
    --warning: #e6a85c;
    --error: #c75b5b;
    --info: #6b9dc7;
    
    /* Тени — тёплые */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
    --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.5);
    --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
    --shadow-glow: 0 0 30px rgba(212, 165, 116, 0.12);
    
    /* Blur */
    --blur-sm: blur(6px);
    --blur-md: blur(12px);
    --blur-lg: blur(24px);
    
    /* Transitions */
    --transition-fast: 0.2s ease;
    --transition-base: 0.3s ease;
    --transition-slow: 0.5s ease;
  }

  body {
    font-family: var(--font-body);
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(212, 165, 116, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139, 90, 43, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(30, 26, 21, 0.5) 0%, transparent 70%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    position: relative;
  }
  
  /* Paper texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
  }

  /* === HEADER === */
  .header {
    background: var(--bg-header);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-family: var(--font-display);
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: opacity 0.2s ease;
  }
  .header h1::before {
    content: '◈';
    color: var(--accent);
    font-size: 1.5rem;
    font-weight: 400;
  }
  .header h1:hover {
    opacity: 0.85;
  }
  .header-nav {
    display: flex;
    gap: 0.5rem;
  }
  .header-nav button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-muted);
    padding: 0.5rem 1.25rem;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
  }
  .header-nav button:hover {
    color: var(--text);
    background: rgba(212, 165, 116, 0.05);
  }
  .header-nav button.active {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: var(--border-accent);
  }
  .header-nav button.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* === STATS BAR === */
  .stats-bar {
    display: none;
    background: rgba(255,255,255,0.02);
    padding: 0.8rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  .stats-bar.visible { display: flex; gap: 2.5rem; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-top: 0.3rem; }
  .stat-clickable { cursor: pointer; border-radius: 8px; padding: 0.3rem 0.5rem; margin: -0.3rem -0.5rem; transition: background 0.2s; }
  .stat-clickable:hover { background: var(--accent-soft); }

  /* === CONTAINER === */
  .container { max-width: 1440px; margin: 0 auto; padding: 2rem; }

  /* === PAGES (router) === */
  .page {
    display: none;
    opacity: 0;
    transform: translateY(20px);
    filter: blur(4px);
    transition: 
      opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
      transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
      filter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .page.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }

  /* === UPLOAD PAGE === */
  .upload-zone {
    position: relative;
    border: 2px dashed var(--border-medium);
    border-radius: 24px;
    padding: 4rem 2rem;
    text-align: center;
    background: 
      radial-gradient(ellipse at center, var(--accent-soft) 0%, transparent 70%),
      var(--bg-card);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .upload-zone::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 24px;
    padding: 2px;
    background: linear-gradient(135deg, var(--accent), transparent, var(--accent));
    -webkit-mask: 
      linear-gradient(#fff 0 0) content-box, 
      linear-gradient(#fff 0 0);
    mask: 
      linear-gradient(#fff 0 0) content-box, 
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .upload-zone:hover::before,
  .upload-zone.dragover::before {
    opacity: 1;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: transparent;
    background: 
      radial-gradient(ellipse at center, rgba(212, 165, 116, 0.15) 0%, transparent 70%),
      var(--bg-card);
    transform: scale(1.005);
  }
  .upload-zone .icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.6;
    transition: all 0.3s ease;
  }
  .upload-zone:hover .icon {
    opacity: 1;
    transform: scale(1.1);
  }
  .upload-zone h2 { 
    font-family: var(--font-display);
    color: var(--text); 
    font-size: 1.5rem; 
    font-weight: 500;
    margin-bottom: 0.8rem; 
  }
  .upload-zone p { 
    color: var(--text-muted); 
    font-size: 0.95rem; 
    margin-bottom: 1.2rem; 
  }
  .upload-zone .formats { 
    color: var(--text-dim); 
    font-size: 0.8rem;
    font-family: var(--font-mono);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
    color: var(--bg);
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 
      0 4px 12px rgba(212, 165, 116, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
  .btn:hover { 
    transform: translateY(-2px);
    box-shadow: 
      0 8px 24px rgba(212, 165, 116, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }
  .btn:disabled { 
    opacity: 0.4; 
    cursor: not-allowed; 
    transform: none;
    box-shadow: none;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border-medium);
    color: var(--text);
    box-shadow: none;
  }
  .btn-outline:hover { 
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
    box-shadow: none;
  }

  .file-list {
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    max-height: 250px;
    overflow-y: auto;
    margin-bottom: 1.5rem;
  }
  .file-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 0.85rem;
    gap: 0.8rem;
  }
  .file-list-item:last-child { border-bottom: none; }
  .file-list-item .name { color: #ccc; }
  .file-list-item .size { color: var(--text-dim); font-size: 0.78rem; }
  .file-preview {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .file-preview-fallback {
    width: 40px;
    height: 40px;
    background: var(--bg-subtle);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .file-list-summary {
    padding: 0.8rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .upload-actions { display: flex; gap: 1rem; align-items: center; }

  /* === PROCESSING PAGE === */
  .processing-card {
    background: var(--bg-card);
    border-radius: 20px;
    border: 1px solid var(--border-light);
    padding: 3rem;
    max-width: 600px;
    margin: 3rem auto;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .processing-card h2 { 
    font-family: var(--font-display);
    color: var(--text); 
    margin-bottom: 0.5rem; 
    font-size: 1.5rem;
    font-weight: 500;
  }
  .processing-stage { 
    color: var(--accent); 
    font-size: 0.95rem; 
    margin-bottom: 2rem;
    font-family: var(--font-body);
  }

  .progress-bar-outer {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 1.25rem;
    position: relative;
  }
  .progress-bar-outer::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255, 255, 255, 0.08) 50%,
      transparent 100%
    );
    animation: shimmer 2s infinite;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
    border-radius: 100px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
    position: relative;
  }
  .progress-bar-inner::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 16px;
    background: var(--accent-secondary);
    border-radius: 2px;
    box-shadow: 0 0 10px var(--accent-secondary);
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    color: var(--text-muted);
    font-size: 0.82rem;
    margin-bottom: 0.5rem;
  }
  .progress-percent { font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 0.3rem; }

  .cancel-btn {
    background: rgba(233, 69, 96, 0.15);
    border: 1px solid rgba(233, 69, 96, 0.4);
    color: var(--text);
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
    margin-top: 1rem;
  }
  .cancel-btn:hover {
    background: rgba(233, 69, 96, 0.25);
    border-color: var(--accent);
  }
  .cancel-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 1.5rem auto 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === GALLERY (persons grid) === */
  .person-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.5rem;
  }
  .person-card {
    position: relative;
    background: var(--bg-card);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border-light);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-md);
  }
  .person-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      transparent 50%,
      rgba(15, 13, 10, 0.85) 100%
    );
    z-index: 1;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .person-card.lazy {
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .person-card:hover {
    transform: translateY(-4px) scale(1.01);
    border-color: var(--border-accent);
    box-shadow: 
      var(--shadow-lg),
      0 0 40px rgba(212, 165, 116, 0.1);
  }
  .person-card:hover::before {
    opacity: 1;
  }
  .person-card .thumb-placeholder {
    width: 100%; 
    aspect-ratio: 1; 
    background: var(--bg-secondary); 
    overflow: hidden;
    position: relative;
  }
  .person-card .thumb {
    width: 100%; 
    aspect-ratio: 1; 
    object-fit: cover; 
    display: block;
    opacity: 0; 
    transition: opacity 0.4s ease, transform 0.5s ease;
  }
  .person-card .thumb.loaded {
    opacity: 1;
  }
  .person-card:hover .thumb {
    transform: scale(1.05);
  }
  .person-card .no-thumb {
    width: 100%; 
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
    display: flex; 
    align-items: center; 
    justify-content: center;
    font-size: 2.5rem; 
    color: var(--text-dim);
  }
  .person-card .info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1rem;
    z-index: 2;
    transform: translateY(4px);
    opacity: 0.85;
    transition: all 0.3s ease;
    background: linear-gradient(transparent, rgba(15, 13, 10, 0.9));
  }
  .person-card:hover .info {
    transform: translateY(0);
    opacity: 1;
  }
  .person-card .name {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 0.25rem;
  }
  .person-card .count {
    font-family: var(--font-body);
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  /* === PERSON DETAIL === */
  .detail-header {
    display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem;
  }
  .back-btn {
    background: transparent;
    border: 1.5px solid var(--border-medium);
    color: var(--text-muted);
    padding: 0.6rem 1.25rem;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .back-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  .detail-avatar {
    width: 88px; height: 88px; border-radius: 50%; object-fit: cover;
    border: 3px solid var(--border-accent);
    box-shadow: var(--shadow-glow);
    flex-shrink: 0;
  }
  .detail-info h2 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
  }
  .detail-info .meta {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 0.3rem;
  }

  .name-edit {
    display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .name-edit input {
    background: transparent; border: 1px solid transparent;
    color: #fff; font-size: 1.4rem; font-weight: 600;
    padding: 0.2rem 0.4rem; border-radius: 6px;
    outline: none; transition: border-color 0.2s;
    width: 300px;
  }
  .name-edit input:hover { border-color: rgba(255,255,255,0.15); }
  .name-edit input:focus { border-color: var(--accent); background: rgba(255,255,255,0.03); }
  .name-edit .edit-icon { color: var(--text-dim); font-size: 0.85rem; cursor: pointer; }

  .section-title {
    font-size: 1rem; font-weight: 600; color: #fff;
    margin: 2rem 0 1rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.75rem;
  }
  .photo-grid img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s ease;
    display: block;
    background: #1a1a2e;
  }
  .photo-grid img:hover { transform: scale(1.02); }

  /* === RELATIONS GRAPH === */
  .graph-container {
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    padding: 1.5rem;
    min-height: 400px;
    position: relative;
  }
  .graph-container svg { width: 100%; height: 400px; }
  .graph-node { cursor: pointer; }
  .graph-node circle { transition: all 0.2s; }
  .graph-node .node-ring { fill: transparent; }
  .graph-node .node-fallback { transition: all 0.2s; }
  .graph-node .node-initials {
    fill: #fff;
    font-size: 10px;
    font-weight: 600;
    text-anchor: middle;
    pointer-events: none;
    user-select: none;
  }
  .graph-node image {
    pointer-events: none;
    image-rendering: auto;
  }
  .graph-node text { fill: var(--text); font-size: 11px; text-anchor: middle; pointer-events: none; }
  .graph-link { stroke: rgba(255,255,255,0.15); stroke-linecap: round; }
  .graph-link:hover { stroke: var(--accent); stroke-width: 2 !important; }
  .graph-no-data { color: var(--text-dim); text-align: center; padding: 3rem; font-size: 0.9rem; }
  
  /* D3 graph tooltips */
  .graph-tooltip {
    position: absolute;
    background: rgba(18, 18, 26, 0.95);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.8rem;
    font-size: 0.85rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
    max-width: 200px;
  }
  .graph-tooltip strong { color: var(--accent); }
  .graph-tooltip .shared { color: var(--text-muted); font-size: 0.75rem; }

  /* === GLASSMORPHISM COMPONENTS === */
  .card-glass {
    background: var(--bg-glass);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    transition: all var(--transition-base) cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-glass:hover {
    background: var(--bg-glass-hover);
    border-color: var(--border-accent);
    box-shadow: var(--shadow-glow);
    transform: translateY(-4px);
  }

  /* === SKELETON LOADERS === */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .skeleton {
    background: linear-gradient(
      90deg,
      var(--bg-tertiary) 25%,
      rgba(212, 165, 116, 0.08) 50%,
      var(--bg-tertiary) 75%
    );
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  .skeleton-circle {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
  }
  .skeleton-text {
    height: 16px;
    margin: 8px 0;
    border-radius: 4px;
  }
  .skeleton-text-sm { width: 60%; }
  .skeleton-text-md { width: 80%; }

  /* === PAGE TRANSITIONS === */
  .page {
    display: none;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity var(--transition-base), transform var(--transition-base);
  }
  .page.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }
  .page.exit {
    opacity: 0;
    transform: translateY(-20px);
  }

  /* === ENHANCED BUTTONS === */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #ff6b81);
    color: white;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-fast);
    box-shadow: var(--shadow-sm);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md), var(--shadow-glow);
  }
  .btn-primary:active {
    transform: translateY(0);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* === BBOX OVERLAY STYLES === */
  .photo-with-faces {
    position: relative;
    display: inline-block;
    width: 100%;
  }
  .photo-with-faces img {
    width: 100%;
    display: block;
  }
  .photo-with-faces svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .face-bbox-primary {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 4px var(--accent));
  }
  .face-bbox-secondary {
    fill: none;
    stroke: var(--success);
    stroke-width: 2;
    filter: drop-shadow(0 0 3px var(--success));
    stroke-dasharray: 5, 5;
  }
  .face-label {
    font-size: 12px;
    font-weight: bold;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* === GALLERY CONTROLS === */
  .gallery-controls {
    display: flex;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .gallery-search {
    flex: 1;
    min-width: 200px;
  }
  .gallery-search input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: border-color var(--transition-fast);
  }
  .gallery-search input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .gallery-sort select,
  .gallery-filter select {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .gallery-sort select:focus,
  .gallery-filter select:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* === GRAPH CONTROLS === */
  .graph-controls {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    margin-bottom: 1rem;
    padding: 0.8rem 1rem;
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    flex-wrap: wrap;
  }
  .graph-control-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .graph-control-group label {
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  .graph-control-group input[type="range"] {
    width: 150px;
  }
  .graph-control-group input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    font-size: 0.9rem;
  }

  /* === GLOBAL GRAPH PAGE === */
  .global-graph-container {
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    min-height: 600px;
    position: relative;
    overflow: hidden;
  }
  .global-graph-stats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-top: 1.5rem;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 1rem;
    text-align: center;
  }
  .stat-card .value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-card .label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  /* === LOAD MORE TRIGGER === */
  .load-more-trigger {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
  }
  .load-more-spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* === ERRORS PAGE === */
  .error-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .error-item {
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .error-item .error-preview {
    width: 60px; height: 60px; border-radius: 8px;
    background: #1a1a2e; object-fit: cover; flex-shrink: 0;
  }
  .error-item .error-details { flex: 1; }
  .error-item .error-file { color: #ccc; font-size: 0.9rem; font-weight: 500; word-break: break-all; }
  .error-item .error-msg { color: var(--accent); font-size: 0.82rem; margin-top: 0.3rem; }
  .error-item .error-type {
    background: rgba(233,69,96,0.15); color: var(--accent);
    padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
  }

  /* === MODAL (fullscreen image) === */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 13, 10, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .modal.active {
    display: flex;
    opacity: 1;
  }
  .modal img { 
    max-width: 90vw;
    max-height: 90vh; 
    border-radius: 8px; 
    object-fit: contain;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
    transform: scale(0.95);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: grab;
  }
  .modal.active img {
    transform: scale(1);
  }
  .modal img:active { cursor: grabbing; }
  .modal-close {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-medium);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.7;
    transition: all 0.25s ease;
    z-index: 1001;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover {
    opacity: 1;
    background: var(--accent-soft);
    border-color: var(--border-accent);
    color: var(--accent);
  }
  
  /* Modal navigation */
  .modal-nav {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.8rem;
    align-items: center;
    z-index: 1001;
    background: rgba(30, 26, 21, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 0.5rem;
    border-radius: 100px;
    border: 1px solid var(--border-light);
  }
  .modal-nav button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-nav button:hover {
    background: var(--accent-soft);
    border-color: var(--border-accent);
    color: var(--accent);
  }
  .modal-nav button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .modal-counter {
    color: var(--text-muted);
    font-size: 0.9rem;
    min-width: 80px;
    text-align: center;
    font-family: var(--font-mono);
  }

  /* === EMPTY STATE === */
  .empty-state {
    text-align: center; padding: 4rem 2rem; color: var(--text-dim);
  }
  .empty-state h3 { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.9rem; }

  /* === LOADING === */
  .loading-state { text-align: center; padding: 3rem; color: var(--text-dim); }

  /* === ERROR ALERT === */
  .error-alert {
    background: rgba(233, 69, 96, 0.1);
    border: 1px solid rgba(233, 69, 96, 0.25);
    border-radius: 8px; padding: 0.8rem 1rem;
    margin-bottom: 1.5rem; color: var(--accent); font-size: 0.9rem;
  }

  /* === RESPONSIVE === */
  @media (max-width: 640px) {
    :root {
      --text-hero: 2rem;
      --text-3xl: 1.5rem;
    }
    .header { 
      padding: 0.75rem 1rem;
      flex-direction: column;
      gap: 0.5rem;
    }
    .header h1 {
      font-size: 1.4rem;
    }
    .header-nav button {
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
    }
    .stats-bar { 
      padding: 0.6rem 1rem;
      gap: 1.2rem;
    }
    .container { padding: 1rem; }
    .person-grid { 
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .person-card .name {
      font-size: 0.95rem;
    }
    .photo-grid { 
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }
    .upload-zone { 
      padding: 2.5rem 1rem;
      border-radius: 16px;
    }
    .upload-zone h2 {
      font-size: 1.25rem;
    }
    .detail-header { 
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
    }
    .detail-avatar {
      width: 64px;
      height: 64px;
    }
    .name-edit input { 
      width: 100%;
      font-size: 1.1rem;
    }
    .processing-card {
      padding: 2rem 1.5rem;
      margin: 1.5rem 1rem;
    }
  }
  
  @media (min-width: 641px) and (max-width: 1024px) {
    .person-grid {
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }
  }
  
  @media (min-width: 1920px) {
    .person-grid {
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }
    .container {
      max-width: 1600px;
    }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1 id="logo">Face Grouper</h1>
  <div class="header-nav" id="nav">
    <button data-page="upload" class="active">Загрузка</button>
    <button data-page="gallery">Галерея</button>
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="stats-bar"></div>

<!-- MAIN CONTENT -->
<div class="container">
  <div id="error-container"></div>

  <!-- UPLOAD PAGE -->
  <div class="page active" id="page-upload">
    <div class="upload-zone" id="upload-zone">
      <div class="icon">📸</div>
      <h2>Перетащите фотографии сюда</h2>
      <p>или нажмите для выбора файлов</p>
      <div class="formats">JPG, JPEG, PNG или ZIP-архив</div>
    </div>
    <input type="file" id="file-input" multiple accept=".jpg,.jpeg,.png,.zip" style="display:none">

    <div class="file-list" id="file-list" style="display:none">
      <div id="file-list-items"></div>
      <div class="file-list-summary" id="file-list-summary"></div>
    </div>

    <div class="upload-actions" id="upload-actions" style="display:none">
      <button class="btn" id="btn-start">Начать обработку</button>
      <button class="btn btn-outline" id="btn-clear">Очистить</button>
    </div>
  </div>

  <!-- PROCESSING PAGE -->
  <div class="page" id="page-processing">
    <div class="processing-card">
      <h2>Обработка фотографий</h2>
      <div class="processing-stage" id="proc-stage">Подготовка...</div>
      <div class="progress-percent" id="proc-percent">0%</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="proc-bar"></div>
      </div>
      <div class="progress-info">
        <span id="proc-elapsed">Прошло: 0:00</span>
        <span id="proc-eta"></span>
      </div>
      <div class="spinner" id="proc-spinner"></div>
      <button class="cancel-btn" id="btn-cancel">Отменить обработку</button>
    </div>
  </div>

  <!-- GALLERY PAGE -->
  <div class="page" id="page-gallery">
    <div class="gallery-controls">
      <div class="gallery-search">
        <input type="text" id="gallery-search" placeholder="Поиск по имени..." autocomplete="off">
      </div>
      <div class="gallery-sort">
        <select id="gallery-sort">
          <option value="photos-desc">По фото (убыв)</option>
          <option value="photos-asc">По фото (возр)</option>
          <option value="name-asc">По имени (А-Я)</option>
          <option value="name-desc">По имени (Я-А)</option>
          <option value="quality-desc">По качеству</option>
        </select>
      </div>
      <div class="gallery-filter">
        <select id="gallery-filter">
          <option value="all">Все персоны</option>
          <option value="many">Много фото (10+)</option>
          <option value="few">Мало фото (1-5)</option>
        </select>
      </div>
    </div>
    <div id="gallery-content"></div>
    <div id="gallery-load-more" class="load-more-trigger" style="display: none;">
      <div class="load-more-spinner"></div>
    </div>
  </div>

  <!-- PERSON DETAIL PAGE -->
  <div class="page" id="page-person">
    <div class="detail-header">
      <button class="back-btn" id="btn-back-gallery">&larr; Назад</button>
      <img class="detail-avatar" id="person-avatar" src="" alt="">
      <div class="detail-info">
        <div class="name-edit">
          <input type="text" id="person-name" placeholder="Имя персоны">
          <span class="edit-icon" title="Нажмите чтобы переименовать">&#9998;</span>
        </div>
        <div class="meta" id="person-meta"></div>
      </div>
    </div>

    <div class="section-title">Фотографии</div>
    <div class="photo-grid" id="person-photos"></div>

    <div class="section-title">Связи с другими персонами</div>
    <div class="graph-container" id="person-graph"></div>
  </div>

  <!-- ERRORS PAGE -->
  <div class="page" id="page-errors">
    <div class="detail-header">
      <button class="back-btn" id="btn-back-errors">&larr; Назад</button>
      <div class="detail-info">
        <h2 id="errors-title">Ошибки обработки</h2>
      </div>
    </div>
    <div class="error-list" id="error-list"></div>
  </div>
</div>

<!-- FULLSCREEN MODAL -->
<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">&times;</button>
  <img id="modal-img" src="" alt="" onclick="event.stopPropagation()">
  <div class="modal-nav" id="modal-nav" style="display:none">
    <button onclick="prevPhoto()" title="Предыдущее">&#10094;</button>
    <button onclick="zoomOut()" title="Уменьшить">−</button>
    <span class="modal-counter" id="modal-counter">1 / 1</span>
    <button onclick="zoomIn()" title="Увеличить">+</button>
    <button onclick="resetZoom()" title="Сброс">↺</button>
    <button onclick="nextPhoto()" title="Следующее">&#10095;</button>
  </div>
</div>

<!-- D3 Graph Tooltip -->
<div class="graph-tooltip" id="graph-tooltip"></div>

<script>
// ============================================================
// STATE
// ============================================================
let report = null;
let currentPage = 'upload';
let currentPersonIdx = null;
let sessionId = null;
let selectedFiles = [];
let sseSource = null;
let processingStartTime = null;

function resetUploadActions() {
  const btnStart = document.getElementById('btn-start');
  btnStart.disabled = false;
  btnStart.textContent = 'Начать обработку';
}

// ============================================================
// ROUTER
// ============================================================
function navigate(page, opts) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + page);
  if (el) el.classList.add('active');

  // Update nav buttons.
  document.querySelectorAll('.header-nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });

  // Stats bar visibility.
  const statsBar = document.getElementById('stats-bar');
  statsBar.classList.toggle('visible', report && (page === 'gallery' || page === 'person' || page === 'errors'));

  if (page === 'gallery') renderGallery();
  if (page === 'person' && opts && opts.idx !== undefined) showPerson(opts.idx);
  if (page === 'errors') renderErrors();
  if (page === 'upload') resetUploadActions();

  window.scrollTo(0, 0);
}

// Nav click handler.
document.getElementById('nav').addEventListener('click', function(e) {
  if (e.target.dataset.page) {
    navigate(e.target.dataset.page);
  }
});
document.getElementById('logo').addEventListener('click', function() {
  navigate(report ? 'gallery' : 'upload');
});

// ============================================================
// UPLOAD PAGE
// ============================================================
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

async function handleFiles(fileList) {
  selectedFiles = Array.from(fileList);
  if (selectedFiles.length === 0) return;

  const listEl = document.getElementById('file-list');
  const itemsEl = document.getElementById('file-list-items');
  const summaryEl = document.getElementById('file-list-summary');
  const actionsEl = document.getElementById('upload-actions');

  let totalSize = 0;
  itemsEl.innerHTML = await Promise.all(selectedFiles.map(async f => {
    totalSize += f.size;
    let preview = '';
    // Generate preview for images.
    if (f.type.startsWith('image/')) {
      try {
        const dataUrl = await readFileAsDataURL(f);
        preview = '<img class="file-preview" src="' + dataUrl + '" alt="">';
      } catch (e) {
        preview = '<div class="file-preview-fallback">' + f.name.split('.').pop().toUpperCase() + '</div>';
      }
    } else {
      preview = '<div class="file-preview-fallback">ZIP</div>';
    }
    return '<div class="file-list-item">' + preview + '<span class="name">' + esc(f.name) + '</span><span class="size">' + formatSize(f.size) + '</span></div>';
  }));

  summaryEl.innerHTML = '<span>' + selectedFiles.length + ' файл(ов)</span><span>' + formatSize(totalSize) + '</span>';
  listEl.style.display = 'block';
  actionsEl.style.display = 'flex';
}

// Helper: read file as data URL.
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

document.getElementById('btn-clear').addEventListener('click', function() {
  selectedFiles = [];
  fileInput.value = '';
  document.getElementById('file-list').style.display = 'none';
  document.getElementById('upload-actions').style.display = 'none';
  resetUploadActions();
});

document.getElementById('btn-start').addEventListener('click', async function() {
  if (selectedFiles.length === 0) return;

  const btn = this;
  btn.disabled = true;
  btn.textContent = 'Загрузка...';

  try {
    // Upload files.
    const formData = new FormData();
    selectedFiles.forEach(f => formData.append('files', f));

    const uploadResp = await fetch('/api/v1/upload', { method: 'POST', body: formData });
    if (!uploadResp.ok) {
      const err = await uploadResp.json();
      throw new Error(err.error || 'Upload failed');
    }

    const uploadData = await uploadResp.json();
    sessionId = uploadData.session_id;

    // Start processing.
    const processResp = await fetch('/api/v1/sessions/' + sessionId + '/process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input_dir: uploadData.upload_path })
    });

    if (!processResp.ok) {
      const err = await processResp.json();
      throw new Error(err.error || 'Processing start failed');
    }

    processingStartTime = Date.now();
    navigate('processing');
    startSSE(sessionId);
    
    // Show cancel button.
    document.getElementById('btn-cancel').style.display = 'block';

  } catch (e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = 'Начать обработку';
  }
});

// Cancel button handler.
document.getElementById('btn-cancel').addEventListener('click', async () => {
  if (!sessionId) return;
  
  const btn = document.getElementById('btn-cancel');
  btn.disabled = true;
  btn.textContent = 'Отмена...';
  
  try {
    const resp = await fetch('/api/v1/sessions/' + sessionId + '/cancel', { method: 'POST' });
    if (resp.ok) {
      showError('Обработка отменена');
      setTimeout(() => navigate('upload'), 1500);
    } else {
      const err = await resp.json();
      showError(err.error || 'Не удалось отменить');
      btn.disabled = false;
      btn.textContent = 'Отменить обработку';
    }
  } catch (e) {
    showError('Ошибка отмены: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Отменить обработку';
  }
});

// ============================================================
// PROCESSING PAGE (SSE)
// ============================================================
function startSSE(sid) {
  if (sseSource) sseSource.close();

  sseSource = new EventSource('/api/v1/sessions/' + sid + '/stream');

  sseSource.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);
      updateProgress(data);

      if (data.done) {
        sseSource.close();
        sseSource = null;

        if (data.error) {
          showError('Ошибка обработки: ' + data.error);
          navigate('upload');
        } else {
          // Load results and go to gallery.
          loadReport().then(() => navigate('gallery'));
        }
      }
    } catch (err) { /* ignore parse errors */ }
  };

  sseSource.onerror = function() {
    // SSE disconnected, fall back to polling.
    sseSource.close();
    sseSource = null;
    pollStatus(sid);
  };
}

function pollStatus(sid) {
  const interval = setInterval(async () => {
    try {
      const resp = await fetch('/api/v1/sessions/' + sid + '/status');
      const data = await resp.json();
      updateProgress(data);

      if (data.status === 'completed' || data.status === 'failed') {
        clearInterval(interval);
        if (data.status === 'failed') {
          showError('Ошибка: ' + (data.error || 'unknown'));
          navigate('upload');
        } else {
          loadReport().then(() => navigate('gallery'));
        }
      }
    } catch (e) { /* retry */ }
  }, 1000);
}

function updateProgress(data) {
  const stageLabels = {
    'scan': 'Сканирование...',
    'extract': 'Обнаружение лиц...',
    'cluster': 'Группировка...',
    'organize': 'Организация результатов...',
    'starting': 'Подготовка...'
  };

  let stage = data.stage_label || stageLabels[data.stage] || data.stage || 'Обработка...';
  const pct = Math.round((data.progress || 0) * 100);
  const elapsed = data.elapsed_ms || (Date.now() - (processingStartTime || Date.now()));
  const processed = data.processed_items || 0;
  const total = data.total_items || 0;

  if (total > 0) {
    stage += ' (' + processed + '/' + total + ')';
  }

  document.getElementById('proc-stage').textContent = stage;
  document.getElementById('proc-percent').textContent = pct + '%';
  document.getElementById('proc-bar').style.width = pct + '%';
  document.getElementById('proc-elapsed').textContent = 'Прошло: ' + formatTime(elapsed);

  // ETA from backend (preferred), fallback to local estimate.
  if (data.eta_ms && data.eta_ms > 0) {
    document.getElementById('proc-eta').textContent = '~' + formatTime(data.eta_ms) + ' осталось';
  } else if (data.progress > 0.05 && data.progress < 1.0) {
    const eta = (elapsed / data.progress) * (1 - data.progress);
    document.getElementById('proc-eta').textContent = '~' + formatTime(eta) + ' осталось';
  } else {
    document.getElementById('proc-eta').textContent = '';
  }
}

// Gallery state for filtering/sorting
let galleryState = {
  persons: [],
  filteredPersons: [],
  displayedCount: 0,
  pageSize: 20,
  searchQuery: '',
  sortBy: 'photos-desc',
  filterBy: 'all'
};

function initGallery() {
  // Search input with debounce
  const searchInput = document.getElementById('gallery-search');
  let searchTimeout;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      galleryState.searchQuery = e.target.value.toLowerCase();
      applyGalleryFilters();
    }, 300);
  });
  
  // Sort select
  document.getElementById('gallery-sort').addEventListener('change', (e) => {
    galleryState.sortBy = e.target.value;
    applyGalleryFilters();
  });
  
  // Filter select
  document.getElementById('gallery-filter').addEventListener('change', (e) => {
    galleryState.filterBy = e.target.value;
    applyGalleryFilters();
  });
}

function applyGalleryFilters() {
  if (!report || !report.persons) return;
  
  // Start with all persons
  let persons = [...report.persons];
  
  // Apply search filter
  if (galleryState.searchQuery) {
    persons = persons.filter(p => {
      const name = (p.custom_name || ('Person ' + p.id)).toLowerCase();
      return name.includes(galleryState.searchQuery);
    });
  }
  
  // Apply count filter
  if (galleryState.filterBy === 'many') {
    persons = persons.filter(p => p.photo_count >= 10);
  } else if (galleryState.filterBy === 'few') {
    persons = persons.filter(p => p.photo_count <= 5);
  }
  
  // Apply sorting
  persons.sort((a, b) => {
    switch (galleryState.sortBy) {
      case 'photos-desc': return b.photo_count - a.photo_count;
      case 'photos-asc': return a.photo_count - b.photo_count;
      case 'name-asc':
        return (a.custom_name || 'Person ' + a.id).localeCompare(b.custom_name || 'Person ' + b.id);
      case 'name-desc':
        return (b.custom_name || 'Person ' + b.id).localeCompare(a.custom_name || 'Person ' + a.id);
      case 'quality-desc':
        return (b.quality_score || 0) - (a.quality_score || 0);
      default: return 0;
    }
  });
  
  galleryState.filteredPersons = persons;
  galleryState.displayedCount = 0;
  
  renderGalleryContent(true);
}

function renderGallerySkeleton(count = 12) {
  return Array(count).fill(0).map(() => 
    '<div class="person-card skeleton">' +
    '<div class="skeleton skeleton-circle"></div>' +
    '<div class="info"><div class="skeleton skeleton-text skeleton-text-md"></div>' +
    '<div class="skeleton skeleton-text skeleton-text-sm"></div></div>' +
    '</div>'
  ).join('');
}

function renderGalleryContent(reset = false) {
  const content = document.getElementById('gallery-content');
  
  if (reset) {
    content.innerHTML = '<div class="person-grid">' + renderGallerySkeleton(12) + '</div>';
    galleryState.displayedCount = 0;
  }
  
  const persons = galleryState.filteredPersons;
  const grid = content.querySelector('.person-grid');
  
  if (persons.length === 0) {
    content.innerHTML = '<div class="empty-state"><h3>Ничего не найдено</h3><p>Попробуйте изменить фильтры или поисковый запрос</p></div>';
    return;
  }
  
  // Calculate which persons to show
  const startIdx = reset ? 0 : galleryState.displayedCount;
  const endIdx = Math.min(startIdx + galleryState.pageSize, persons.length);
  const personsToShow = persons.slice(startIdx, endIdx);
  
  // Generate HTML
  const cardsHtml = personsToShow.map((p, i) => {
    const actualIdx = report.persons.indexOf(p);
    const preview = p.avatar_path || p.thumbnail;
    const thumb = preview
      ? '<div class="thumb-placeholder"><img class="thumb lazy" data-src="/output/' + preview + '" alt="" src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 160 160\'%3E%3Crect fill=\'%231a1a2e\' width=\'160\' height=\'160\'/%3E%3Ccircle cx=\'80\' cy=\'60\' r=\'25\' fill=\'%232a2a3e\'/%3E%3Cpath d=\'M80 100 Q80 130 120 130 L40 130 Q80 130 80 100\' fill=\'%232a2a3e\'/%3E%3C/svg%3E"></div>'
      : '<div class="no-thumb">&#128100;</div>';
    const name = p.custom_name || ('Person ' + p.id);
    const quality = p.quality_score ? ' &middot; q:' + p.quality_score.toFixed(2) : '';
    return '<div class="person-card lazy" data-idx="' + actualIdx + '">'
      + thumb
      + '<div class="info"><div class="name">' + esc(name) + '</div>'
      + '<div class="count">' + p.photo_count + ' фото &middot; ' + p.face_count + ' лиц' + quality + '</div>'
      + '</div></div>';
  }).join('');
  
  if (reset) {
    grid.innerHTML = cardsHtml;
  } else {
    // Append new cards
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = cardsHtml;
    while (tempDiv.firstChild) {
      grid.appendChild(tempDiv.firstChild);
    }
  }
  
  galleryState.displayedCount = endIdx;
  
  // Update load more button
  const loadMore = document.getElementById('gallery-load-more');
  if (galleryState.displayedCount < persons.length) {
    loadMore.style.display = 'block';
    setupInfiniteScroll();
  } else {
    loadMore.style.display = 'none';
  }
  
  // Setup lazy loading
  setupLazyLoading(grid);
}

function setupLazyLoading(container) {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const card = entry.target;
        const img = card.querySelector('.lazy');
        if (img && img.dataset.src) {
          img.src = img.dataset.src;
          img.onload = () => {
            img.classList.add('loaded');
            card.classList.remove('lazy');
          };
        } else {
          card.classList.remove('lazy');
        }
        observer.unobserve(card);
      }
    });
  }, { rootMargin: '100px', threshold: 0.01 });

  container.querySelectorAll('.person-card.lazy').forEach(card => {
    observer.observe(card);
    card.addEventListener('click', () => navigate('person', { idx: parseInt(card.dataset.idx) }));
  });
}

let infiniteScrollObserver = null;

function setupInfiniteScroll() {
  if (infiniteScrollObserver) {
    infiniteScrollObserver.disconnect();
  }
  
  const trigger = document.getElementById('gallery-load-more');
  if (!trigger || trigger.style.display === 'none') return;
  
  infiniteScrollObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
      renderGalleryContent(false);
    }
  }, { rootMargin: '200px' });
  
  infiniteScrollObserver.observe(trigger);
}

function renderGallery() {
  // Initialize state if needed
  if (galleryState.persons.length === 0 && report && report.persons) {
    galleryState.persons = report.persons;
    initGallery();
  }
  
  // Reset controls
  document.getElementById('gallery-search').value = galleryState.searchQuery;
  document.getElementById('gallery-sort').value = galleryState.sortBy;
  document.getElementById('gallery-filter').value = galleryState.filterBy;
  
  applyGalleryFilters();
}

// ============================================================
// RELATIONS GRAPH (D3.js)
// ============================================================
async function renderRelationsGraph(person) {
  const container = document.getElementById('person-graph');
  const tooltip = document.getElementById('graph-tooltip');

  if (!window.d3) {
    container.innerHTML = '<div class="graph-no-data">Граф связей временно недоступен: библиотека D3 не загрузилась</div>';
    return;
  }
  
  // Clear previous graph.
  container.innerHTML = '';
  
  // Use report data to find co-occurrences.
  if (!report || !report.persons || report.persons.length < 2) {
    container.innerHTML = '<div class="graph-no-data">Недостаточно данных для построения графа связей</div>';
    return;
  }
  
  // Build co-occurrence from shared photos (compare by basename, not full path).
  const getBaseName = (path) => path.split('/').pop();
  const currentPhotoNames = new Set((person.photos || []).map(getBaseName));
  const links = [];
  const nodeMap = new Map();

  // Add center node (current person).
  nodeMap.set(person.id, {
    id: person.id,
    name: person.custom_name || 'Person ' + person.id,
    avatar: person.avatar_path || person.thumbnail,
    group: 'center',
    photoCount: person.photo_count
  });

  report.persons.forEach((other, idx) => {
    if (other.id === person.id) return;

    const shared = (other.photos || []).filter(p => currentPhotoNames.has(getBaseName(p))).length;
    if (shared > 0) {
      links.push({
        source: person.id,
        target: other.id,
        shared: shared,
        similarity: shared / Math.max(person.photo_count, other.photo_count)
      });
      
      if (!nodeMap.has(other.id)) {
        nodeMap.set(other.id, {
          id: other.id,
          name: other.custom_name || 'Person ' + other.id,
          avatar: other.avatar_path || other.thumbnail,
          group: 'related',
          photoCount: other.photo_count,
          reportIdx: idx
        });
      }
    }
  });
  
  const nodes = Array.from(nodeMap.values());
  
  if (links.length === 0) {
    container.innerHTML = '<div class="graph-no-data">Нет связей с другими персонами</div>';
    return;
  }
  
  // D3 force simulation.
  const width = container.clientWidth || 600;
  const height = 400;
  
  // Remove previous SVG.
  container.querySelector('svg')?.remove();
  
  const svg = d3.select('#person-graph')
    .append('svg')
    .attr('viewBox', [0, 0, width, height])
    .attr('width', '100%')
    .attr('height', height);
  
  // Shared SVG defs.
  const defs = svg.append('defs');
  
  // Create arrow marker for links.
  defs.append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('fill', 'rgba(255,255,255,0.15)')
    .attr('d', 'M0,-5L10,0L0,5');
  
  const gLinks = svg.append('g').attr('class', 'links');
  const gNodes = svg.append('g').attr('class', 'nodes');
  const gLabels = svg.append('g').attr('class', 'labels');
  
  // Node-specific clip paths for circular avatars.
  defs.selectAll('clipPath.node-avatar-clip')
    .data(nodes)
    .join('clipPath')
    .attr('class', 'node-avatar-clip')
    .attr('id', d => 'avatar-clip-' + d.id)
    .append('circle')
    .attr('r', d => d.group === 'center' ? 24 : 19)
    .attr('cx', 0)
    .attr('cy', 0);
  
  // Create simulation.
  const simulation = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collide', d3.forceCollide(40))
    .force('link', d3.forceLink(links)
      .id(d => d.id)
      .distance(120)
      .strength(d => d.similarity * 0.8)
    );
  
  // Draw links.
  const link = gLinks.selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'graph-link')
    .attr('stroke-width', d => Math.min(6, 1 + d.shared * 0.8))
    .attr('opacity', d => Math.min(0.8, 0.2 + d.shared * 0.15))
    .attr('marker-end', 'url(#arrowhead)');
  
  // Add link labels (shared count).
  const linkLabel = gLabels.selectAll('text')
    .data(links)
    .join('text')
    .attr('class', 'link-label')
    .attr('fill', 'var(--text-muted)')
    .attr('font-size', '10')
    .attr('text-anchor', 'middle')
    .text(d => d.shared);
  
  // Draw nodes.
  const node = gNodes.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'graph-node')
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended)
    );
  
  // Outer ring is always visible to keep hover/highlight stable.
  node.append('circle')
    .attr('class', 'node-ring')
    .attr('r', d => d.group === 'center' ? 28 : 22)
    .attr('fill', 'transparent')
    .attr('stroke', 'var(--accent)')
    .attr('stroke-width', 1.5)
    .attr('opacity', 0.9);
  
  // Fallback fill for nodes without avatar.
  node.append('circle')
    .attr('class', 'node-fallback')
    .attr('r', d => d.group === 'center' ? 24 : 19)
    .attr('fill', d => d.group === 'center' ? 'var(--accent)' : '#1a1a2e')
    .attr('opacity', d => d.avatar ? 0 : 0.95);
  
  // Initials inside fallback nodes.
  node.append('text')
    .attr('class', 'node-initials')
    .attr('dy', 3)
    .attr('opacity', d => d.avatar ? 0 : 1)
    .text(d => {
      const words = (d.name || '').trim().split(/\s+/).filter(Boolean);
      if (words.length >= 2) {
        return (words[0][0] + words[1][0]).toUpperCase();
      }
      if (words.length === 1) {
        return words[0].slice(0, 2).toUpperCase();
      }
      return 'P' + String(d.id);
    });
  
  // Avatar image inside circular clip.
  node.filter(d => !!d.avatar)
    .append('image')
    .attr('x', d => -(d.group === 'center' ? 24 : 19))
    .attr('y', d => -(d.group === 'center' ? 24 : 19))
    .attr('width', d => (d.group === 'center' ? 48 : 38))
    .attr('height', d => (d.group === 'center' ? 48 : 38))
    .attr('href', d => '/output/' + d.avatar)
    .attr('clip-path', d => 'url(#avatar-clip-' + d.id + ')')
    .on('error', function(event, d) {
      d3.select(this).remove();
      d3.select(this.parentNode).select('.node-fallback').attr('opacity', 0.95);
      d3.select(this.parentNode).select('.node-initials').attr('opacity', 1);
    });
  
  // Node labels.
  node.append('text')
    .attr('dy', d => (d.group === 'center' ? 41 : 34))
    .attr('fill', 'var(--text)')
    .attr('font-size', '10')
    .attr('font-weight', d => d.group === 'center' ? 'bold' : 'normal')
    .attr('text-anchor', 'middle')
    .text(d => d.name.length > 12 ? d.name.substring(0, 11) + '…' : d.name)
    .style('pointer-events', 'none');
  
  // Hover effects.
  node.on('mouseover', function(event, d) {
    d3.select(this).select('.node-ring')
      .attr('stroke-width', 3)
      .attr('filter', 'brightness(1.3)');
    d3.select(this).select('.node-fallback')
      .attr('filter', 'brightness(1.15)');
    
    // Highlight connected links.
    link.filter(l => l.source.id === d.id || l.target.id === d.id)
      .attr('stroke', 'var(--accent)')
      .attr('stroke-width', l => Math.max(3, Math.min(6, 1 + l.shared * 0.8)));
    
    // Show tooltip.
    tooltip.style.opacity = 1;
    tooltip.innerHTML = `
      <strong>${esc(d.name)}</strong><br>
      <span class="shared">${d.photoCount} фото</span>
    `;
  })
  .on('mousemove', function(event) {
    tooltip.style.left = (event.pageX + 15) + 'px';
    tooltip.style.top = (event.pageY - 10) + 'px';
  })
  .on('mouseout', function() {
    d3.select(this).select('.node-ring')
      .attr('stroke-width', 1.5)
      .attr('filter', null);
    d3.select(this).select('.node-fallback')
      .attr('filter', null);
    
    link.attr('stroke', null);
    tooltip.style.opacity = 0;
  })
  .on('click', function(event, d) {
    if (d.group !== 'center' && d.reportIdx !== undefined) {
      navigate('person', { idx: d.reportIdx });
    }
  });
  
  // Update positions on tick.
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    
    linkLabel
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2 - 8);
    
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
  
  // Drag functions.
  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }
  
  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }
  
  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }
}

// ============================================================
// ERRORS PAGE
// ============================================================
function renderErrors() {
  const listEl = document.getElementById('error-list');
  const titleEl = document.getElementById('errors-title');

  if (!report || !report.file_errors) {
    listEl.innerHTML = '<div class="empty-state"><p>Нет ошибок</p></div>';
    return;
  }

  const errors = Object.entries(report.file_errors);
  titleEl.textContent = 'Ошибки обработки (' + errors.length + ')';

  listEl.innerHTML = errors.map(([file, msg], i) => {
    const errorType = classifyError(msg);
    const typeLabels = {
      'no_face': 'Нет лиц',
      'unsupported_format': 'Формат',
      'processing_error': 'Ошибка'
    };

    // Попытаться найти превью в отчёте.
    const thumb = findErrorThumbnail(file);
    
    return '<div class="error-item">'
      + '<div class="error-preview">'
      + (thumb 
        ? '<img src="/output/' + thumb + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="error-preview-fallback" style="display:none">' + (i + 1) + '</div>'
        : '<div class="error-preview-fallback">' + (i + 1) + '</div>'
      )
      + '</div>'
      + '<div class="error-details">'
      + '<div class="error-file">' + esc(file) + '</div>'
      + '<div class="error-msg">' + esc(msg) + '</div>'
      + '</div>'
      + '<span class="error-type">' + (typeLabels[errorType] || errorType) + '</span>'
      + '</div>';
  }).join('');
}

function findErrorThumbnail(file) {
  // Поиск превью в отчёте по имени файла.
  const baseName = file.replace(/\.[^/.]+$/, '');
  
  // Ищем в персонах фото с похожим именем.
  for (const person of (report.persons || [])) {
    for (const photo of (person.photos || [])) {
      if (photo.includes(baseName)) {
        return photo;
      }
    }
  }
  
  return null;
}

function classifyError(msg) {
  const lower = msg.toLowerCase();
  if (lower.includes('no face') || lower.includes('0 faces') || lower.includes('face not found')) return 'no_face';
  if (lower.includes('unsupported') || lower.includes('format') || lower.includes('decode')) return 'unsupported_format';
  return 'processing_error';
}

// ============================================================
// MODAL (with zoom and navigation)
// ============================================================
let modalPhotos = [];
let modalPhotoIndex = 0;
let modalZoom = 1;

function openModal(src, index, photos) {
  modalZoom = 1;
  
  if (photos && photos.length > 0) {
    modalPhotos = photos;
    modalPhotoIndex = index !== undefined ? index : 0;
    document.getElementById('modal-img').src = modalPhotos[modalPhotoIndex];
    document.getElementById('modal-nav').style.display = 'flex';
    updateModalCounter();
  } else {
    modalPhotos = [src];
    modalPhotoIndex = 0;
    document.getElementById('modal-img').src = src;
    document.getElementById('modal-nav').style.display = 'none';
  }
  
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
  resetZoom();
}

function zoomIn() {
  modalZoom = Math.min(modalZoom * 1.5, 5);
  applyZoom();
}

function zoomOut() {
  modalZoom = Math.max(modalZoom / 1.5, 1);
  applyZoom();
}

function resetZoom() {
  modalZoom = 1;
  applyZoom();
}

function applyZoom() {
  const img = document.getElementById('modal-img');
  img.style.transform = `scale(${modalZoom})`;
}

function nextPhoto() {
  if (modalPhotos.length <= 1) return;
  modalPhotoIndex = (modalPhotoIndex + 1) % modalPhotos.length;
  document.getElementById('modal-img').src = modalPhotos[modalPhotoIndex];
  resetZoom();
  updateModalCounter();
}

function prevPhoto() {
  if (modalPhotos.length <= 1) return;
  modalPhotoIndex = (modalPhotoIndex - 1 + modalPhotos.length) % modalPhotos.length;
  document.getElementById('modal-img').src = modalPhotos[modalPhotoIndex];
  resetZoom();
  updateModalCounter();
}

function updateModalCounter() {
  if (modalPhotos.length > 1) {
    document.getElementById('modal-counter').textContent = 
      (modalPhotoIndex + 1) + ' / ' + modalPhotos.length;
  } else {
    document.getElementById('modal-counter').textContent = '';
  }
}

// Wheel zoom
document.getElementById('modal-img').addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.deltaY < 0) zoomIn();
  else zoomOut();
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('modal').classList.contains('active')) return;
  
  if (e.key === 'Escape') {
    closeModal();
  } else if (e.key === 'ArrowRight' && modalPhotos.length > 1) {
    nextPhoto();
  } else if (e.key === 'ArrowLeft' && modalPhotos.length > 1) {
    prevPhoto();
  } else if (e.key === '+' || e.key === '=') {
    zoomIn();
  } else if (e.key === '-') {
    zoomOut();
  } else if (e.key === '0') {
    resetZoom();
  }
});

// ============================================================
// HELPERS
// ============================================================
function showError(msg) {
  const el = document.getElementById('error-container');
  el.innerHTML = '<div class="error-alert">' + esc(msg) + '</div>';
  setTimeout(() => { el.innerHTML = ''; }, 8000);
}

function esc(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function formatTime(ms) {
  const sec = Math.floor(ms / 1000);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

// ============================================================
// INIT
// ============================================================
async function init() {
  // Try to load existing report.
  try {
    const resp = await fetch('/api/report');
    if (resp.ok) {
      report = await resp.json();
      renderStats();
      navigate('gallery');
      return;
    }
  } catch (e) { /* no report, stay on upload */ }

  navigate('upload');
}

init();
</script>
