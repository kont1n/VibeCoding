# =============================================================================
# Face Grouper - Pre-commit Configuration
# =============================================================================
# Documentation: https://pre-commit.com/
# Install: pre-commit install
# =============================================================================

repos:
  # Go linter
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.5
    hooks:
      - id: golangci-lint
        args: [--config=.golangci.yml]
        stages: [commit]

  # Go module tidy
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        pass_filenames: false
        stages: [commit]
        files: \.go$
        types_or: [go]

  # Go tests
  - repo: local
    hooks:
      - id: go-test
        name: go test
        entry: go test -short ./...
        language: system
        pass_filenames: false
        stages: [push]
        files: \.go$
        types_or: [go]

  # Trailing whitespace
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']

  # Dockerfile lint
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: ['--ignore=DL3008', '--ignore=DL3013']

  # Shell check
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: ['-x']

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            go\.sum|
            go\.mod|
            package-lock\.json|
            \.secrets\.baseline
          )$

  # Copyright headers
  - repo: local
    hooks:
      - id: copyright-header
        name: Copyright Header
        entry: |
          bash -c '
          for file in $(git diff --cached --name-only --diff-filter=ACM | grep "\.go$"); do
            if ! head -1 "$file" | grep -q "^// Code generated"; then
              if ! grep -q "Face Grouper" "$file"; then
                echo "❌ Missing copyright header in $file"
                exit 1
              fi
            fi
          done
          '
        language: system
        stages: [commit]
        files: \.go$

  # Taskfile validation
  - repo: local
    hooks:
      - id: taskfile-validate
        name: Validate Taskfile
        entry: task --list
        language: system
        pass_filenames: false
        stages: [commit]
        files: Taskfile\.yml$
