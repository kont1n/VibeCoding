version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/query"
    schema: "internal/database/postgres/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/database/postgres/db"
        sql_package: "pgx/v5"
        
        # Code generation options
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        
        # Output file options
        output_files_suffix: ".sql.go"
        
        # Type overrides
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          
          - db_type: "timestamptz"
            go_type: "time.Time"
          
          - db_type: "timestamp"
            go_type: "time.Time"
          
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          
          - db_type: "vector"
            go_type: "github.com/pgvector/pgvector-go.Vector"
